name: manhgg

services:
  mongodb:
    image: mongo:7
    container_name: manhgg-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: manhgg-backend
    working_dir: /app
    restart: unless-stopped
    command: sh ./dev-watch.sh
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/manhgg}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    depends_on:
      - mongodb

  frontend:
    image: node:22-alpine
    container_name: manhgg-frontend
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongo-data:
  maven-cache:
  frontend-node-modules:
