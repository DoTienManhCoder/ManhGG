name: manhgg

services:
  mongodb:
    image: mongo:7
    container_name: manhgg-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: manhgg-backend
    working_dir: /app
    restart: unless-stopped
    command: sh ./dev-watch.sh
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/manhgg}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MEDIA_STORAGE_DIR: /data/media
      DELETE_GRIDFS_AFTER_MIGRATION: ${DELETE_GRIDFS_AFTER_MIGRATION:-false}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-manhgg/rooms}
      DELETE_SOURCE_AFTER_CLOUDINARY_MIGRATION: ${DELETE_SOURCE_AFTER_CLOUDINARY_MIGRATION:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - media-data:/data/media
      - maven-cache:/root/.m2
    depends_on:
      - mongodb

  frontend:
    image: node:22-alpine
    container_name: manhgg-frontend
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongo-data:
  media-data:
  maven-cache:
  frontend-node-modules:
