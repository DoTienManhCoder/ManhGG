server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/manhgg}
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 1200MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  media:
    storage-dir: ${MEDIA_STORAGE_DIR:./uploads/media}
    delete-gridfs-after-migration: ${DELETE_GRIDFS_AFTER_MIGRATION:false}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:manhgg/rooms}
    delete-source-after-migration: ${DELETE_SOURCE_AFTER_CLOUDINARY_MIGRATION:false}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
